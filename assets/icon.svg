<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background gradient: deep forge black with warm wine tint -->
    <radialGradient id="bg" cx="38%" cy="30%" r="72%">
      <stop offset="0%"   stop-color="#2a0c14"/>
      <stop offset="60%"  stop-color="#110508"/>
      <stop offset="100%" stop-color="#080306"/>
    </radialGradient>
    <!-- Inner glow behind the rune -->
    <radialGradient id="glow" cx="44%" cy="42%" r="50%">
      <stop offset="0%"   stop-color="#c8395a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c8395a" stop-opacity="0"/>
    </radialGradient>
    <!-- Rune stroke glow filter -->
    <filter id="rune-glow" x="-18%" y="-18%" width="136%" height="136%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle outer shadow -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#c8395a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer border — subtle wine rim -->
  <rect width="512" height="512" rx="96" fill="none"
        stroke="#3d1020" stroke-width="8"/>

  <!-- Inner warm glow -->
  <ellipse cx="210" cy="210" rx="200" ry="180" fill="url(#glow)"/>

  <!-- Corner rune tick marks — decorative, very faint -->
  <line x1="44"  y1="44"  x2="82"  y2="44"  stroke="#c8395a" stroke-width="7" stroke-linecap="square" opacity="0.22"/>
  <line x1="44"  y1="44"  x2="44"  y2="82"  stroke="#c8395a" stroke-width="7" stroke-linecap="square" opacity="0.22"/>
  <line x1="468" y1="44"  x2="430" y2="44"  stroke="#c8395a" stroke-width="7" stroke-linecap="square" opacity="0.22"/>
  <line x1="468" y1="44"  x2="468" y2="82"  stroke="#c8395a" stroke-width="7" stroke-linecap="square" opacity="0.22"/>
  <line x1="44"  y1="468" x2="82"  y2="468" stroke="#c8395a" stroke-width="7" stroke-linecap="square" opacity="0.22"/>
  <line x1="44"  y1="468" x2="44"  y2="430" stroke="#c8395a" stroke-width="7" stroke-linecap="square" opacity="0.22"/>

  <!-- ══ RUNIC R MARK (Raidho ᚱ) — angular, Elder Futhark-inspired ══ -->

  <!-- Left vertical spine -->
  <line x1="148" y1="76" x2="148" y2="436"
        stroke="#f5e8ed" stroke-width="36" stroke-linecap="square"
        filter="url(#rune-glow)"/>

  <!-- Top bowl: horizontal cap → angled right side → mid crossbar back -->
  <polyline points="148,76 316,76 390,150 390,222 316,296 148,296"
            stroke="#f5e8ed" stroke-width="36"
            stroke-linecap="square" stroke-linejoin="miter"
            fill="none" filter="url(#rune-glow)"/>

  <!-- Diagonal leg (from bowl midpoint to lower-right) -->
  <line x1="262" y1="296" x2="398" y2="436"
        stroke="#f5e8ed" stroke-width="36" stroke-linecap="square"
        filter="url(#rune-glow)"/>

  <!-- Stave tick marks on spine — Futhark branch marks -->
  <line x1="148" y1="192" x2="188" y2="160" stroke="#c8395a" stroke-width="12" stroke-linecap="square" opacity="0.65"/>
  <line x1="148" y1="352" x2="188" y2="320" stroke="#c8395a" stroke-width="12" stroke-linecap="square" opacity="0.50"/>

  <!-- Wine accent dot top-right -->
  <circle cx="418" cy="90" r="16" fill="#a02840" opacity="0.92"/>
  <circle cx="418" cy="132" r="9"  fill="#a02840" opacity="0.38"/>
</svg>
